name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: tethr ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            label: macos-arm64
            node-platform: darwin
            node-arch: arm64

          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            label: macos-x86_64
            node-platform: darwin
            node-arch: x64

          # ── Linux ──────────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            rust-target: ''
            label: linux-x86_64
            node-platform: linux
            node-arch: x64

          - platform: ubuntu-24.04-arm
            rust-target: ''
            label: linux-arm64
            node-platform: linux
            node-arch: arm64

          # ── Windows ────────────────────────────────────────────────────────
          - platform: windows-latest
            rust-target: ''
            label: windows-x86_64
            node-platform: win
            node-arch: x64

          - platform: windows-11-arm
            rust-target: ''
            label: windows-arm64
            node-platform: win
            node-arch: arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install JS dependencies
        run: pnpm install

      - name: Download target Node binary for sidecar
        run: node scripts/download-sidecar.mjs ${{ matrix.node-platform }} ${{ matrix.node-arch }}

      # ── macOS ────────────────────────────────────────────────────────────
      - name: Build (macOS)
        if: matrix.node-platform == 'darwin'
        run: pnpm tauri build --target ${{ matrix.rust-target }} --bundles app

      - name: Package and upload macOS artifact
        if: matrix.node-platform == 'darwin'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          LABEL="${{ matrix.label }}"
          APP_PATH="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/tethr.app"
          ZIP_NAME="tethr-${TAG}-${LABEL}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "ARTIFACT=$ZIP_NAME" >> "$GITHUB_ENV"

      # ── Linux ─────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: matrix.node-platform == 'linux'
        run: pnpm tauri build --bundles appimage

      - name: Package and upload Linux artifact
        if: matrix.node-platform == 'linux'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          LABEL="${{ matrix.label }}"
          SRC=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          DEST="tethr-${TAG}-${LABEL}.AppImage"
          mv "$SRC" "$DEST"
          echo "ARTIFACT=$DEST" >> "$GITHUB_ENV"

      # ── Windows ───────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.node-platform == 'win'
        run: pnpm tauri build --bundles nsis

      - name: Package and upload Windows artifact
        if: matrix.node-platform == 'win'
        shell: pwsh
        run: |
          $tag   = "${{ github.ref_name }}"
          $label = "${{ matrix.label }}"
          $zip   = "tethr-${tag}-${label}-portable.zip"
          Compress-Archive -Path "src-tauri\target\release\tethr.exe" -DestinationPath $zip
          echo "ARTIFACT=$zip" >> $env:GITHUB_ENV

      # ── Upload (all platforms) ─────────────────────────────────────────────
      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
