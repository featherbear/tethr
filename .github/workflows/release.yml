name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: tethr ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest,     label: macos-universal, rust-target: universal-apple-darwin, node-platform: darwin, node-arch: universal, bundles: app      }
          - { platform: ubuntu-22.04,     label: linux-x86_64,    rust-target: '',                    node-platform: linux,  node-arch: x64,       bundles: appimage }
          - { platform: ubuntu-24.04-arm, label: linux-arm64,     rust-target: '',                    node-platform: linux,  node-arch: arm64,      bundles: appimage }
          - { platform: windows-latest,   label: windows-x86_64,  rust-target: '',                    node-platform: win,    node-arch: x64,        bundles: nsis     }
          - { platform: windows-11-arm,   label: windows-arm64,   rust-target: '',                    node-platform: win,    node-arch: arm64,       bundles: nsis     }

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - run: pnpm install

      - name: Set up sidecar
        run: node scripts/download-sidecar.mjs ${{ matrix.node-platform }} ${{ matrix.node-arch }}

      - name: Build
        shell: bash
        run: |
          ARGS="--bundles ${{ matrix.bundles }}"
          [ -n "${{ matrix.rust-target }}" ] && ARGS="$ARGS --target ${{ matrix.rust-target }}"
          pnpm tauri build $ARGS

      - name: Package artifact
        run: node scripts/package-artifact.mjs ${{ matrix.label }} ${{ github.ref_name }} ${{ matrix.rust-target }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
