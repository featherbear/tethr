name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: tethr ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest,     label: macos-universal, rust-target: universal-apple-darwin, rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin', node-platform: darwin, node-arch: universal, bundles: app,      runtime: bun  }
          - { platform: ubuntu-22.04,     label: linux-x86_64,    rust-target: '',                    rust-targets: '',                                                node-platform: linux,  node-arch: x64,       bundles: appimage, runtime: bun  }
          # linux-arm64 uses Node instead of Bun: linuxdeploy's gtk plugin runs ldd on every
          # ELF in the AppDir including js-runtime. The arm64 linuxdeploy crashes when ldd
          # fails on the statically-linked Bun binary. Node is dynamically linked so ldd
          # succeeds, sidestepping the crash.
          - { platform: ubuntu-24.04-arm, label: linux-arm64,     rust-target: '',                    rust-targets: '',                                                node-platform: linux,  node-arch: arm64,     bundles: appimage, runtime: node }
          - { platform: windows-latest,   label: windows-x86_64,  rust-target: '',                    rust-targets: '',                                                node-platform: win,    node-arch: x64,       bundles: none,     runtime: bun  }
          - { platform: windows-11-arm,   label: windows-arm64,   rust-target: '',                    rust-targets: '',                                                node-platform: win,    node-arch: arm64,     bundles: none,     runtime: bun  }

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils \
            libfuse2

      - run: pnpm install

      - name: Build SvelteKit
        run: pnpm build

      - name: Debug postbuild output
        shell: bash
        run: |
          echo "=== server_modules contents ==="
          ls -la server_modules/ || echo "server_modules/ does not exist"
          ls -la server_modules/node_modules/ 2>/dev/null | head -10 || echo "server_modules/node_modules/ does not exist"

      - name: Set up sidecar
        run: node scripts/download-sidecar.mjs ${{ matrix.node-platform }} ${{ matrix.node-arch }} ${{ matrix.runtime }}

      - name: Verify resources exist before bundling
        shell: bash
        run: |
          echo "=== Resource directories ==="
          ls -la build/ | head -10
          ls -la src-tauri/binaries/runtime/ || { echo "❌ runtime/ missing!"; exit 1; }
          ls -la server_modules/node_modules/ | head -5 || { echo "❌ server_modules/node_modules/ missing!"; exit 1; }
          echo "=== build/index.js ==="
          ls -la build/index.js || { echo "❌ build/index.js missing!"; exit 1; }

      - name: Build
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        run: |
          if [ "${{ matrix.bundles }}" = "none" ]; then
            ARGS="--no-bundle"
          else
            ARGS="--bundles ${{ matrix.bundles }}"
          fi
          [ -n "${{ matrix.rust-target }}" ] && ARGS="$ARGS --target ${{ matrix.rust-target }}"
          pnpm tauri build $ARGS 2>&1 | tee /tmp/tauri-build.log | tail -50
          echo "=== Tauri build log (resource lines) ==="
          grep -i "resource\|copy\|bundle\|skip\|warn" /tmp/tauri-build.log || true

          # For --no-bundle builds, Tauri doesn't copy resources — do it manually
          if [ "${{ matrix.bundles }}" = "none" ]; then
            TARGET_DIR="src-tauri/target/release"
            echo "Copying resources manually for --no-bundle build..."
            mkdir -p "$TARGET_DIR/resources/build"
            mkdir -p "$TARGET_DIR/resources/runtime"
            cp -r build/. "$TARGET_DIR/resources/build/"
            cp -r server_modules/node_modules "$TARGET_DIR/resources/build/node_modules"
            cp src-tauri/binaries/runtime/js-runtime.exe "$TARGET_DIR/resources/runtime/js-runtime.exe"
            echo "=== resources/ after manual copy ==="
            du -sh "$TARGET_DIR/resources/"*
          fi

      - name: Inspect bundle contents
        shell: bash
        run: |
          echo "=== src-tauri/target/release/ top-level ==="
          ls -la src-tauri/target/release/*.exe 2>/dev/null || ls -la src-tauri/target/release/tethr 2>/dev/null || echo "no main binary found"
          echo "=== src-tauri/target/release/resources/ ==="
          find src-tauri/target/release/resources/ -maxdepth 3 2>/dev/null | head -30 || echo "no resources dir"
          echo "=== bundle dir ==="
          find src-tauri/target/release/bundle/ -maxdepth 3 2>/dev/null | head -20 || true

      - name: Verify bundle size
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target/${{ matrix.rust-target && format('{0}/', matrix.rust-target) || '' }}release"

          if [ "${{ matrix.bundles }}" = "none" ]; then
            # Windows --no-bundle: check resources/ dir is present and large enough
            RESOURCES_DIR="$TARGET_DIR/resources"
            SIZE=$(du -sm "$RESOURCES_DIR" 2>/dev/null | cut -f1 || echo 0)
            echo "Resources dir: $RESOURCES_DIR — ${SIZE}MB"
            if [ "${SIZE:-0}" -lt 50 ]; then
              echo "❌ resources/ is suspiciously small (${SIZE}MB < 50MB) — runtime likely missing!"
              exit 1
            fi
            echo "✅ resources/ size OK (${SIZE}MB)"
          else
            # Other platforms: check the bundle artifact size
            find "$TARGET_DIR/bundle" -name "*.AppImage" -o -name "*.deb" -o -name "*.app" 2>/dev/null | while read f; do
              SIZE=$(du -sm "$f" | cut -f1)
              echo "Bundle: $f — ${SIZE}MB"
              if [ "$SIZE" -lt 50 ]; then
                echo "❌ Bundle is suspiciously small (${SIZE}MB < 50MB) — resources likely missing!"
                exit 1
              fi
              echo "✅ Bundle size OK (${SIZE}MB)"
            done
          fi

      - name: Package artifact
        run: node scripts/package-artifact.mjs ${{ matrix.label }} ${{ github.ref_name }} ${{ matrix.rust-target }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
