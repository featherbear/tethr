name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: tethr ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin --bundles app'
            label: macos-arm64
            node-platform: darwin
            node-arch: arm64

          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin --bundles app'
            label: macos-x86_64
            node-platform: darwin
            node-arch: x64

          # ── Linux ──────────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            rust-target: ''
            tauri-args: '--bundles appimage'
            label: linux-x86_64
            node-platform: linux
            node-arch: x64

          - platform: ubuntu-24.04-arm
            rust-target: ''
            tauri-args: '--bundles appimage'
            label: linux-arm64
            node-platform: linux
            node-arch: arm64

          # ── Windows ────────────────────────────────────────────────────────
          - platform: windows-latest
            rust-target: ''
            tauri-args: '--bundles nsis'
            label: windows-x86_64
            portable: true
            skip-tauri-action: true
            node-platform: win
            node-arch: x64

          - platform: windows-11-arm
            rust-target: ''
            tauri-args: '--bundles nsis'
            label: windows-arm64
            portable: true
            skip-tauri-action: true
            node-platform: win
            node-arch: arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install JS dependencies
        run: pnpm install

      - name: Download target Node binary for sidecar
        run: node scripts/download-sidecar.mjs ${{ matrix.node-platform }} ${{ matrix.node-arch }}

      - name: Build Tauri app (via tauri-action — non-Windows)
        if: ${{ !matrix.skip-tauri-action }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: tethr ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Build Tauri app (Windows — manual, portable zip only)
        if: ${{ matrix.skip-tauri-action }}
        run: pnpm tauri build ${{ matrix.tauri-args }}

      # Windows: also upload a portable zip (raw .exe, no installation required)
      - name: Create Windows portable zip
        if: matrix.portable
        shell: pwsh
        run: |
          $zipName = "tethr-${{ github.ref_name }}-${{ matrix.label }}-portable.zip"
          Compress-Archive -Path "src-tauri\target\release\tethr.exe" -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows portable zip to release
        if: matrix.portable
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
