name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: tethr ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest,     label: macos-universal, rust-target: universal-apple-darwin, rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin', node-platform: darwin, node-arch: universal, bundles: app,      runtime: bun  }
          - { platform: ubuntu-22.04,     label: linux-x86_64,    rust-target: '',                    rust-targets: '',                                                node-platform: linux,  node-arch: x64,       bundles: appimage, runtime: bun  }
          # linux-arm64 uses Node instead of Bun: linuxdeploy's gtk plugin runs ldd on every
          # ELF in the AppDir including js-runtime. The arm64 linuxdeploy crashes when ldd
          # fails on the statically-linked Bun binary. Node is dynamically linked so ldd
          # succeeds, sidestepping the crash.
          - { platform: ubuntu-24.04-arm, label: linux-arm64,     rust-target: '',                    rust-targets: '',                                                node-platform: linux,  node-arch: arm64,     bundles: appimage, runtime: node }
          - { platform: windows-latest,   label: windows-x86_64,  rust-target: '',                    rust-targets: '',                                                node-platform: win,    node-arch: x64,       bundles: none,     runtime: bun  }
          - { platform: windows-11-arm,   label: windows-arm64,   rust-target: '',                    rust-targets: '',                                                node-platform: win,    node-arch: arm64,     bundles: none,     runtime: bun  }

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils \
            libfuse2

      - run: pnpm install

      - name: Build SvelteKit
        run: pnpm build

      - name: Set up sidecar
        run: node scripts/download-sidecar.mjs ${{ matrix.node-platform }} ${{ matrix.node-arch }} ${{ matrix.runtime }}

      - name: Stage runtime into build/
        shell: bash
        run: |
          mkdir -p build/runtime
          RUNTIME_SRC=$(ls src-tauri/binaries/runtime/)
          cp "src-tauri/binaries/runtime/$RUNTIME_SRC" "build/runtime/$RUNTIME_SRC"

      - name: Build
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        run: |
          if [ "${{ matrix.bundles }}" = "none" ]; then
            ARGS="--no-bundle"
          else
            ARGS="--bundles ${{ matrix.bundles }}"
          fi
          [ -n "${{ matrix.rust-target }}" ] && ARGS="$ARGS --target ${{ matrix.rust-target }}"
          pnpm tauri build $ARGS

          # Windows --no-bundle: Tauri doesn't copy resources — do it manually
          if [ "${{ matrix.bundles }}" = "none" ]; then
            TARGET_DIR="src-tauri/target/release"
            mkdir -p "$TARGET_DIR/resources/build"
            cp -r build/. "$TARGET_DIR/resources/build/"
            cp -r server_modules/node_modules "$TARGET_DIR/resources/build/node_modules"
          fi

      - name: Inspect binary size
        if: matrix.label == 'macos-universal'
        shell: bash
        run: ls -lASh src-tauri/target/universal-apple-darwin/release/bundle/macos/tethr.app/Contents/MacOS/

      - name: Package artifact
        run: node scripts/package-artifact.mjs ${{ matrix.label }} ${{ github.ref_name }} ${{ matrix.rust-target }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ARTIFACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
