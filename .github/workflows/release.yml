name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin --bundles app'
            label: macos-arm64

          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin --bundles app'
            label: macos-x86_64

          - platform: ubuntu-22.04
            rust-target: ''
            tauri-args: '--bundles appimage,deb'
            label: linux-x86_64

          - platform: windows-latest
            rust-target: ''
            tauri-args: '--bundles nsis'
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: tethr ${{ github.ref_name }}
          releaseBody: |
            ## Downloads

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `tethr_*_aarch64.dmg` |
            | macOS (Intel) | `tethr_*_x64.dmg` |
            | Windows (installer) | `tethr_*_x64-setup.exe` |
            | Windows (portable) | `tethr-*-windows-portable.zip` |
            | Linux (AppImage) | `tethr_*_amd64.AppImage` |
            | Linux (deb) | `tethr_*_amd64.deb` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      # Windows: also upload a portable zip (raw .exe, no installation required)
      - name: Create Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $exePath = "src-tauri\target\release\tethr.exe"
          $zipName = "tethr-${{ github.ref_name }}-windows-portable.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
