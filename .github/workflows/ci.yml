name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: SvelteKit type-check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type-check (svelte-check)
        run: pnpm check

      - name: Build SvelteKit output
        run: pnpm build
